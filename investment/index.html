<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Portfolio & Averaging Strategy</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #b8860b; border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; margin-bottom: 20px; }
        h3 { color: #555; font-size: 1.1em; margin-top: 30px; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { text-align: left; background: #fafafa; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 0.95em; }
        
        /* Buttons */
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn { background: #b8860b; color: white; margin-bottom: 15px; }
        .add-btn:hover { background: #9a7209; }
        .del-btn { background: #fee2e2; color: #dc2626; padding: 6px 12px; font-size: 0.85em; }
        .del-btn:hover { background: #fecaca; }
        
        /* Summary & Strategy Section */
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .summary-box { background: #fffdf0; border-color: #f0e68c; }
        .strategy-box { background: #f0f7ff; border-color: #bae6fd; }
        
        .val { font-weight: bold; color: #b8860b; float: right; }
        .item { margin-bottom: 12px; font-size: 1em; }
        
        #planResult { margin-top: 15px; padding: 12px; border-radius: 6px; font-weight: bold; display: none; }
        .success-msg { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gold Portfolio & Averaging Strategy</h2>
    
    <p>1. Enter your existing purchase lots below:</p>
    <button class="btn add-btn" onclick="addRow()">+ Add Lot</button>

    <table id="goldTable">
        <thead>
            <tr>
                <th>Qty (Grams)</th>
                <th>Rate (per 10g)</th>
                <th>Total Value</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td><input type="number" class="qty" value="200" oninput="calculateAll()"></td>
                <td><input type="number" class="rate" value="172300" oninput="calculateAll()"></td>
                <td><input type="text" class="lineTotal" readonly value="₹34,46,000" style="border:none; background:transparent;"></td>
                <td><button class="btn del-btn" onclick="removeRow(this)">Delete</button></td>
            </tr>
            <tr>
                <td><input type="number" class="qty" value="100" oninput="calculateAll()"></td>
                <td><input type="number" class="rate" value="186500" oninput="calculateAll()"></td>
                <td><input type="text" class="lineTotal" readonly value="₹18,65,000" style="border:none; background:transparent;"></td>
                <td><button class="btn del-btn" onclick="removeRow(this)">Delete</button></td>
            </tr>
        </tbody>
    </table>

    <div class="grid-layout">
        <div class="box summary-box">
            <h3>Current Status</h3>
            <div class="item">Total Weight: <span id="totalWeight" class="val">300 g</span></div>
            <div class="item">Total Invested: <span id="totalInvestment" class="val">₹53,11,000</span></div>
            <div class="item" style="border-top: 1px solid #f0e68c; padding-top: 10px; margin-top: 10px;">
                <strong>Weighted Avg (10g):</strong> <span id="weightedAvg" class="val">₹1,77,033</span>
            </div>
        </div>

        <div class="box strategy-box">
            <h3>Averaging Strategy</h3>
            <div class="item">
                <label>Today's Rate (10g):</label>
                <input type="number" id="todayRate" placeholder="e.g. 155000" oninput="calculateAll()" style="margin-top:5px;">
            </div>
            <div class="item">
                <label>Target Average (10g):</label>
                <input type="number" id="targetAvg" placeholder="e.g. 165000" oninput="calculateAll()" style="margin-top:5px;">
            </div>
            <div id="planResult"></div>
        </div>
    </div>
</div>

<script>
    function addRow() {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="number" class="qty" placeholder="0" oninput="calculateAll()"></td>
            <td><input type="number" class="rate" placeholder="0" oninput="calculateAll()"></td>
            <td><input type="text" class="lineTotal" readonly value="₹0" style="border:none; background:transparent;"></td>
            <td><button class="btn del-btn" onclick="removeRow(this)">Delete</button></td>
        `;
        tbody.appendChild(row);
    }

    function removeRow(btn) {
        btn.parentElement.parentElement.remove();
        calculateAll();
    }

    function calculateAll() {
        const rows = document.querySelectorAll('#tableBody tr');
        let totalGrams = 0;
        let totalCost = 0;

        // 1. Calculate Portfolio Status
        rows.forEach(row => {
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const ratePer10g = parseFloat(row.querySelector('.rate').value) || 0;
            const lineValue = (qty / 10) * ratePer10g;
            
            row.querySelector('.lineTotal').value = "₹" + lineValue.toLocaleString('en-IN');
            totalGrams += qty;
            totalCost += lineValue;
        });

        const currentAvg = totalGrams > 0 ? (totalCost / (totalGrams / 10)) : 0;

        document.getElementById('totalWeight').innerText = totalGrams + " g";
        document.getElementById('totalInvestment').innerText = "₹" + totalCost.toLocaleString('en-IN');
        document.getElementById('weightedAvg').innerText = "₹" + Math.round(currentAvg).toLocaleString('en-IN');

        // 2. Calculate Averaging Plan
        const pToday = parseFloat(document.getElementById('todayRate').value);
        const target = parseFloat(document.getElementById('targetAvg').value);
        const planDiv = document.getElementById('planResult');

        if (pToday && target && target < currentAvg) {
            // Formula: x = (CurrentQtyIn10g * (Target - CurrentAvg)) / (TodayRate - Target)
            const q1 = totalGrams / 10;
            let x = (q1 * (target - currentAvg)) / (pToday - target);

            if (x > 0) {
                planDiv.style.display = "block";
                planDiv.className = "success-msg";
                planDiv.innerHTML = `BUY PLAN: Buy <b>${x.toFixed(2)}</b> lots (10g each) to reach your target.`;
            } else {
                planDiv.style.display = "none";
            }
        } else {
            planDiv.style.display = "none";
        }
    }

    // Initial calculation
    calculateAll();
</script>

</body>
</html>
