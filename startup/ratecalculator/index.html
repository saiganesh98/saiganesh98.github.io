<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rate Calculator</title>
  <style>
    /* ─── Reset & Base ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad-bg:   linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --grad-card: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      --grad-btn:  linear-gradient(90deg, #f093fb, #f5576c);
      --grad-result: linear-gradient(135deg, #43e97b, #38f9d7);
      --accent:    #f093fb;
      --accent2:   #38f9d7;
      --text:      #e8e8f8;
      --muted:     #9898bc;
      --border:    rgba(255,255,255,0.12);
      --shadow:    0 8px 32px rgba(0,0,0,0.45);
      --radius:    18px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--grad-bg);
      background-attachment: fixed;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      overflow-x: hidden;
    }

    /* ─── Floating Orbs ───────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: floatOrb 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 420px; height: 420px; background: #f093fb; top: -100px; left: -120px; animation-duration: 14s; }
    .orb-2 { width: 360px; height: 360px; background: #38f9d7; bottom: -80px; right: -100px; animation-duration: 10s; animation-delay: -4s; }
    .orb-3 { width: 280px; height: 280px; background: #f5576c; top: 40%; left: 50%; animation-duration: 16s; animation-delay: -8s; }

    @keyframes floatOrb {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(40px) scale(1.08); }
    }

    /* ─── Header ──────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.7s ease both;
    }
    header .badge {
      display: inline-block;
      padding: 4px 16px;
      background: rgba(240,147,251,0.15);
      border: 1px solid rgba(240,147,251,0.35);
      border-radius: 100px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f093fb, #38f9d7, #f5576c);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @keyframes shimmer {
      0%   { background-position: 0% }
      100% { background-position: 200% }
    }

    /* ─── Card ────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--grad-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s ease both;
    }

    /* ─── Section Label ───────────────────────────────── */
    .section-label {
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Field Group ─────────────────────────────────── */
    .field-group {
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 500;
    }
    label span.hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      font-weight: 400;
      margin-left: 6px;
    }

    /* ─── Input ───────────────────────────────────────── */
    .input-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,147,251,0.15);
    }
    .input-wrap input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      padding: 13px 16px;
      -moz-appearance: textfield;
    }
    .input-wrap input[type="number"]::-webkit-inner-spin-button,
    .input-wrap input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .input-wrap .unit {
      padding: 0 14px;
      font-size: 0.78rem;
      color: var(--muted);
      border-left: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ─── Commission Toggle ───────────────────────────── */
    .commission-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .commission-row .input-wrap { flex: 1; }
    .toggle-group {
      display: flex;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }
    .toggle-group button {
      background: rgba(255,255,255,0.04);
      border: none;
      color: var(--muted);
      padding: 0 18px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      height: 48px;
    }
    .toggle-group button.active-add {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #0a2a1a;
    }
    .toggle-group button.active-sub {
      background: linear-gradient(135deg, #f5576c, #f093fb);
      color: #2a0a10;
    }
    .toggle-group button:hover:not(.active-add):not(.active-sub) {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }

    /* ─── Divider ─────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* ─── Calculate Button ────────────────────────────── */
    .btn-calc {
      width: 100%;
      padding: 16px;
      background: var(--grad-btn);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 20px rgba(240,147,251,0.35);
    }
    .btn-calc:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(240,147,251,0.5);
    }
    .btn-calc:active { transform: translateY(0); }
    .btn-calc .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ─── Result Panel ────────────────────────────────── */
    .result-panel {
      margin-top: 32px;
      border-radius: var(--radius);
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .result-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .result-header {
      background: linear-gradient(135deg, #1a1a3e, #2a1a3e);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 18px 24px;
    }
    .result-header h2 {
      font-size: 0.75rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .breakdown-list {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-top: none;
      border-bottom: none;
    }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      animation: slideIn 0.3s ease both;
      transition: background 0.2s;
    }
    .breakdown-item:hover { background: rgba(255,255,255,0.04); }
    .breakdown-item:last-child { border-bottom: none; }
    .breakdown-item .b-label { font-size: 0.88rem; color: var(--muted); }
    .breakdown-item .b-value { font-size: 0.92rem; font-weight: 600; }
    .breakdown-item .b-value.deduction { color: #f87171; }
    .breakdown-item .b-value.addition  { color: #4ade80; }
    .breakdown-item .b-value.base      { color: var(--accent2); }

    .result-footer {
      background: linear-gradient(135deg, rgba(67,233,123,0.12), rgba(56,249,215,0.08));
      border: 1px solid rgba(67,233,123,0.3);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-footer .final-label {
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4ade80;
    }
    .result-footer .final-value {
      font-size: 2rem;
      font-weight: 800;
      background: var(--grad-result);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.85; }
    }

    /* ─── Reset Button ────────────────────────────────── */
    .btn-reset {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-reset:hover {
      border-color: #f5576c;
      color: #f5576c;
      background: rgba(245,87,108,0.06);
    }

    /* ─── Animations ──────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .commission-row { flex-direction: column; align-items: stretch; }
      .toggle-group { width: 100%; }
      .toggle-group button { flex: 1; }
    }

    /* ─── Bill / Chess Selector ────────────────────────── */
    .bc-selector {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .bc-selector button {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.5px;
    }
    .bc-selector button.bc-active {
      background: linear-gradient(90deg, #f093fb, #f5576c);
      color: #fff;
    }
    .bc-selector button:not(.bc-active):hover {
      background: rgba(255,255,255,0.07);
      color: var(--text);
    }
    .bc-field {
      display: none;
      animation: fadeUp 0.25s ease both;
    }
    .bc-field.bc-visible { display: block; }

    /* ─── Tooltip ─────────────────────────────────────── */
    [data-tip] { position: relative; cursor: help; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #1e1e3f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.75rem;
      color: var(--text);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 10;
    }
    [data-tip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
  </style>
</head>
<body>

  <!-- Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Header -->
  <header>
    <div class="badge">Agricultural Trade Tool</div>
    <h1>Rate Calculator</h1>
    <p>Calculate net delivery rate after all deductions &amp; adjustments</p>
  </header>

  <!-- Main Card -->
  <div class="card">

    <!-- Base Rate -->
    <div class="section-label">Base Rate</div>

    <div class="field-group">
      <label for="rate">Rate <span class="hint">per quintal</span></label>
      <div class="input-wrap">
        <input type="number" id="rate" placeholder="e.g. 1000" min="0" step="0.01" />
        <span class="unit">₹ / quintal</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Deductions -->
    <div class="section-label">Deductions</div>

    <!-- Bill / Chess Selector -->
    <div class="field-group">
      <label>Deduction Type <span class="hint">choose one</span></label>
      <div class="bc-selector" role="group" aria-label="Bill or Chess">
        <button id="bcBillBtn" class="bc-active" onclick="setBillChess('bill')">With Bill (%)</button>
        <button id="bcChessBtn" onclick="setBillChess('chess')">Chess (₹/quintal)</button>
      </div>

      <div class="bc-field bc-visible" id="grp-bill">
        <label for="bill" data-tip="Percentage of rate deducted as bill amount">Bill Amount</label>
        <div class="input-wrap">
          <input type="number" id="bill" value="1" min="0" step="0.01" />
          <span class="unit">%</span>
        </div>
      </div>

      <div class="bc-field" id="grp-chess">
        <label for="chess" data-tip="Fixed amount deducted per quintal">Chess Amount</label>
        <div class="input-wrap">
          <input type="number" id="chess" value="10" min="0" step="0.01" />
          <span class="unit">₹ / quintal</span>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label for="shoot"
        data-tip="Weight loss in kg per tonne (1000 kg). Converted to ₹ deduction per quintal.">
        Shoot <span class="hint">kg per tonne</span>
      </label>
      <div class="input-wrap">
        <input type="number" id="shoot" value="5" min="0" step="0.01" />
        <span class="unit">kg / tonne</span>
      </div>
    </div>

    <div class="field-group">
      <label for="cashDiscount"
        data-tip="Percentage of rate deducted as cash discount">
        Cash Discount
      </label>
      <div class="input-wrap">
        <input type="number" id="cashDiscount" value="1" min="0" step="0.01" />
        <span class="unit">%</span>
      </div>
    </div>

    <!-- Commission (with +/- toggle) -->
    <div class="field-group">
      <label data-tip="Commission can be added to or subtracted from rate">Commission <span class="hint">per quintal</span></label>
      <div class="commission-row">
        <div class="input-wrap">
          <input type="number" id="commission" value="10" min="0" step="0.01" />
          <span class="unit">₹ / quintal</span>
        </div>
        <div class="toggle-group" role="group" aria-label="Commission direction">
          <button id="btnAdd" class="active-add" aria-pressed="false" onclick="setCommission('add')">＋</button>
          <button id="btnSub" aria-pressed="true"  onclick="setCommission('sub')">−</button>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label for="unloading"
        data-tip="Fixed unloading charge deducted per quintal">
        Unloading
      </label>
      <div class="input-wrap">
        <input type="number" id="unloading" value="10" min="0" step="0.01" />
        <span class="unit">₹ / quintal</span>
      </div>
    </div>

    <div class="field-group">
      <label for="lorryRent"
        data-tip="Transport / lorry rent deducted per quintal">
        Lorry Rent
      </label>
      <div class="input-wrap">
        <input type="number" id="lorryRent" value="240" min="0" step="0.01" />
        <span class="unit">₹ / quintal</span>
      </div>
    </div>

    <!-- Calculate -->
    <button class="btn-calc" id="calcBtn" onclick="calculate()">
      Calculate Net Rate
    </button>

    <!-- Result -->
    <div class="result-panel" id="resultPanel">
      <div class="result-header">
        <h2>Breakdown</h2>
      </div>
      <div class="breakdown-list" id="breakdownList"></div>
      <div class="result-footer">
        <span class="final-label">Net Rate / Quintal</span>
        <span class="final-value" id="finalValue">₹ 0.00</span>
      </div>
    </div>

    <button class="btn-reset" onclick="resetForm()">Reset All Fields</button>

  </div><!-- /card -->

  <script>
    // ── Commission Direction ─────────────────────────────
    let commissionDir = 'add'; // 'add' | 'sub'

    function setCommission(dir) {
      commissionDir = dir;
      document.getElementById('btnAdd').className = dir === 'add' ? 'active-add' : '';
      document.getElementById('btnSub').className = dir === 'sub' ? 'active-sub' : '';
    }

    // ── Ripple Effect ────────────────────────────────────
    document.getElementById('calcBtn').addEventListener('click', function (e) {
      const btn = this;
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left  = (e.clientX - rect.left  - size / 2) + 'px';
      ripple.style.top   = (e.clientY - rect.top   - size / 2) + 'px';
      btn.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });

    // ── Calculate ────────────────────────────────────────
    function calculate() {
      const rate        = parseFloat(document.getElementById('rate').value)        || 0;
      const billDisabled  = document.getElementById('grp-bill').classList.contains('bc-visible') === false;
      const chessDisabled = document.getElementById('grp-chess').classList.contains('bc-visible') === false;
      const billPct     = billDisabled  ? 0 : (parseFloat(document.getElementById('bill').value)  || 0);
      const chess       = chessDisabled ? 0 : (parseFloat(document.getElementById('chess').value) || 0);
      const shootKg     = parseFloat(document.getElementById('shoot').value)       || 0;
      const cashDiscPct = parseFloat(document.getElementById('cashDiscount').value)|| 0;
      const commPct     = parseFloat(document.getElementById('commission').value)  || 0;
      const unloading   = parseFloat(document.getElementById('unloading').value)   || 0;
      const lorryRent   = parseFloat(document.getElementById('lorryRent').value)   || 0;

      if (rate <= 0) {
        alert('Please enter a valid Rate.');
        return;
      }

      // ── Calculation Logic ──────────────────────────────
      // Bill: percentage of rate
      const billAmt = (billPct / 100) * rate;

      // Chess: flat ₹ per quintal
      const chessAmt = chess;

      // Shoot: shootKg kg per 1000 kg (1 tonne) → ratio × rate
      //   deduction per quintal = (shootKg / 1000) × rate
      const shootAmt = (shootKg / 1000) * rate;

      // Cash Discount: percentage of rate
      const cashDiscAmt = (cashDiscPct / 100) * rate;

      // Commission: flat ±₹ per quintal
      const commAmt = commPct;

      // Unloading: flat ₹ per quintal
      const unloadingAmt = unloading;

      // Lorry Rent: flat ₹ per quintal
      const lorryAmt = lorryRent;

      // Total deductions (commission applied per direction)
      const totalDed = billAmt + chessAmt + shootAmt + cashDiscAmt + unloadingAmt + lorryAmt
                       + (commissionDir === 'sub' ? commAmt : -commAmt);

      const netRate = rate - totalDed;

      // ── Render Breakdown ───────────────────────────────
      const items = [
        {
          label: `Base Rate`,
          raw:   rate,
          cls:   'base',
          prefix: '+'
        },
        ...(!billDisabled ? [{
          label: `Bill (${billPct}% of ₹${fmt(rate)})`,
          raw:   billAmt,
          cls:   'deduction',
          prefix: '−'
        }] : []),
        ...(!chessDisabled ? [{
          label: `Chess (flat)`,
          raw:   chessAmt,
          cls:   'deduction',
          prefix: '−'
        }] : []),
        {
          label: `Shoot (${shootKg}kg/tonne → ${fmt((shootKg/10))}%)`,
          raw:   shootAmt,
          cls:   'deduction',
          prefix: '−'
        },
        {
          label: `Cash Discount (${cashDiscPct}%)`,
          raw:   cashDiscAmt,
          cls:   'deduction',
          prefix: '−'
        },
        {
          label: `Commission (${commissionDir === 'add' ? '+' : '−'}₹${fmt(commPct)}/quintal)`,
          raw:   commAmt,
          cls:   commissionDir === 'add' ? 'addition' : 'deduction',
          prefix: commissionDir === 'add' ? '+' : '−'
        },
        {
          label: `Unloading (flat)`,
          raw:   unloadingAmt,
          cls:   'deduction',
          prefix: '−'
        },
        {
          label: `Lorry Rent (flat)`,
          raw:   lorryAmt,
          cls:   'deduction',
          prefix: '−'
        },
      ];

      const list = document.getElementById('breakdownList');
      list.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'breakdown-item';
        div.style.animationDelay = (i * 0.05) + 's';
        div.innerHTML = `
          <span class="b-label">${item.label}</span>
          <span class="b-value ${item.cls}">${item.prefix} ₹${fmt(item.raw)}</span>
        `;
        list.appendChild(div);
      });

      document.getElementById('finalValue').textContent = `₹ ${fmt(netRate)}`;

      // Show panel
      const panel = document.getElementById('resultPanel');
      panel.classList.add('visible');
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
    }

    // ── Helpers ──────────────────────────────────────────
    function fmt(n) {
      return Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function resetForm() {
      document.getElementById('rate').value        = '';
      document.getElementById('bill').value        = '1';
      document.getElementById('chess').value       = '10';
      setBillChess('bill');
      document.getElementById('shoot').value       = '5';
      document.getElementById('cashDiscount').value= '1';
      document.getElementById('commission').value  = '10';
      document.getElementById('unloading').value   = '10';
      document.getElementById('lorryRent').value   = '240';
      setCommission('add');
      const panel = document.getElementById('resultPanel');
      panel.classList.remove('visible');
    }

    // ── Bill / Chess Toggle ────────────────────────────
    let billChessMode = 'bill'; // 'bill' | 'chess'

    function setBillChess(mode) {
      billChessMode = mode;
      document.getElementById('grp-bill').classList.toggle('bc-visible',  mode === 'bill');
      document.getElementById('grp-chess').classList.toggle('bc-visible', mode === 'chess');
      document.getElementById('bcBillBtn').classList.toggle('bc-active',  mode === 'bill');
      document.getElementById('bcChessBtn').classList.toggle('bc-active', mode === 'chess');
    }

    // ── Live Re-calculate on Enter ───────────────────────
    document.querySelectorAll('input[type="number"]').forEach(input => {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    });
  </script>
</body>
</html>
